# MCP Tool Configuration — Oracle Forge
# Defines all four DAB database types as MCP sources and tools.
# Served by mcp/toolbox_server.py (Python MCP JSON-RPC server).
#
# Note: Google MCP Toolbox binary (genai-toolbox 0.31.0) does not support
# DuckDB natively and fails silently with config files on this server.
# Our Python MCP server (mcp/toolbox_server.py) implements the same protocol
# and supports all four database types the challenge requires.
#
# Start server:  conda run -n dabench python mcp/toolbox_server.py
# Verify:        curl http://localhost:5000/health

# ── SOURCES (Database Connections) ───────────────────────────────────────────

sources:

  mongo-yelp:
    kind: mongodb
    uri: "mongodb://localhost:27017/"
    database: yelp_db
    status: ACTIVE
    description: "Yelp business metadata and check-in records"

  duckdb-yelp:
    kind: duckdb
    database: "/shared/oracle-forge/DataAgentBench/query_yelp/query_dataset/yelp_user.db"
    status: ACTIVE
    description: "Yelp user reviews, tips, and user profiles"

  pg-dab:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: dab_main
    user: oracle_forge
    password: "${PG_PASSWORD}"
    status: PENDING
    description: "PostgreSQL DAB datasets — not yet loaded (Sprint 2)"

  sqlite-dab:
    kind: sqlite
    database: "/shared/oracle-forge/DataAgentBench/query_yelp/query_dataset/yelp.db"
    status: PENDING
    description: "SQLite DAB datasets — not yet loaded (Sprint 2)"

# ── TOOLS ────────────────────────────────────────────────────────────────────

tools:

  query_mongodb:
    kind: custom-python
    source: mongo-yelp
    description: >
      Query a MongoDB collection using find (filter+projection) or
      aggregate (pipeline). Returns JSON records.
    parameters:
      - name: db_name
        type: string
        description: "Logical DB name (e.g. 'businessinfo_database')"
      - name: collection
        type: string
        description: "Collection name (e.g. 'business', 'checkin')"
      - name: query_type
        type: string
        enum: [find, aggregate]
      - name: query
        type: string
        description: "JSON filter dict (find) or pipeline array (aggregate)"
      - name: projection
        type: string
        description: "Optional JSON projection dict (find only)"

  query_duckdb:
    kind: custom-python
    source: duckdb-yelp
    description: >
      Run a SQL query against a DuckDB database file.
      Supports analytical SQL: CTEs, window functions, TRY_STRPTIME.
    parameters:
      - name: db_name
        type: string
        description: "Logical DB name (e.g. 'user_database')"
      - name: sql
        type: string
        description: "SQL query to execute"

  query_postgres:
    kind: postgres-sql
    source: pg-dab
    status: PENDING
    description: "Run SQL against PostgreSQL (no DAB datasets loaded yet)"
    parameters:
      - name: db_name
        type: string
      - name: sql
        type: string

  query_sqlite:
    kind: sqlite-sql
    source: sqlite-dab
    status: PENDING
    description: "Run SQL against SQLite (no DAB datasets loaded yet)"
    parameters:
      - name: db_name
        type: string
      - name: sql
        type: string

# ── TOOLSET ───────────────────────────────────────────────────────────────────

toolsets:
  oracle-forge:
    tools:
      - query_mongodb
      - query_duckdb
      - query_postgres
      - query_sqlite
